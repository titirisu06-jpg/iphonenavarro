<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Navarro | Más iPhone. Por menos.</title>
    <meta name="description" content="iPhones nuevos, sellados y usados en Navarro, Buenos Aires. Más de 10 mil ventas. Envíos a todo el país. Plan Canje. Mayorista y minorista.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'abyss': '#060608',
              'midnight': '#0F0F14',
              'surface-light': '#F5F5F7',
              'surface-white': '#FFFFFF',
              'ink': '#1D1D1F',
              'ink-secondary': '#424245',
              'ink-tertiary': '#6E6E73',
              'iphone-blue': '#0071E3',
              'iphone-blue-light': '#2997FF',
              'iphone-blue-dark': '#0051A2',
              'chrome': '#1C1C1E',
              'chrome-elevated': '#2C2C2E',
              'chrome-border': '#48484A',
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            },
            animation: {
              'float': 'float 7s ease-in-out infinite',
              'glow-pulse': 'glowPulse 3s ease-in-out infinite',
              'scroll-line': 'scrollLine 2.5s ease-in-out infinite',
              'fade-up': 'fadeUp 0.6s ease-out both',
            },
            keyframes: {
              float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-18px)' } },
              glowPulse: { '0%,100%': { opacity: '0.4', transform: 'scale(1)' }, '50%': { opacity: '0.8', transform: 'scale(1.08)' } },
              scrollLine: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(400%)' } },
              fadeUp: { '0%': { opacity: '0', transform: 'translateY(28px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            },
          }
        }
      }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: #060608; color: #1D1D1F; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* --- Section themes --- */
        .section-light { background: #F5F5F7; }
        .section-white { background: #FFFFFF; }
        .section-dark  { background: #060608; }

        /* --- Glass nav (light on scroll) --- */
        .glass-nav-scrolled {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(0,0,0,0.07);
        }
        .glass-nav-hero {
            background: transparent;
        }

        /* --- Gradient text --- */
        .text-gradient-blue {
            background: linear-gradient(135deg, #0071E3 0%, #2997FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-hero {
            background: linear-gradient(135deg, #FFFFFF 0%, #A8C8FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* --- Cards --- */
        .card-white {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.04);
            transition: transform 250ms ease, box-shadow 250ms ease;
            cursor: pointer;
        }
        .card-white:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .card-dark {
            background: #1C1C1E;
            border: 1px solid #3A3A3C;
            border-radius: 20px;
            transition: transform 250ms ease, border-color 250ms ease;
        }
        .card-dark:hover {
            transform: translateY(-4px);
            border-color: #0071E3;
        }

        /* --- CTA Button --- */
        .btn-primary {
            background: #0071E3;
            color: #fff;
            font-weight: 600;
            border-radius: 980px;
            padding: 14px 28px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: background 200ms ease, transform 150ms ease, box-shadow 200ms ease;
            box-shadow: 0 4px 16px rgba(0,113,227,0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #0077ED;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,113,227,0.45);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-weight: 600;
            border-radius: 980px;
            padding: 14px 28px;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: background 200ms ease, border-color 200ms ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.4);
        }

        /* --- Lead form --- */
        .lead-input {
            width: 100%;
            background: #FFFFFF;
            border: 1.5px solid #D2D2D7;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 15px;
            color: #1D1D1F;
            font-family: Inter, sans-serif;
            outline: none;
            transition: border-color 200ms ease, box-shadow 200ms ease;
        }
        .lead-input:focus {
            border-color: #0071E3;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.14);
        }
        .lead-input::placeholder { color: #86868B; }

        /* --- Hero grid --- */
        .hero-grid {
            background-image:
                linear-gradient(rgba(0,113,227,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,113,227,0.035) 1px, transparent 1px);
            background-size: 56px 56px;
        }

        /* --- Reveal animations --- */
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.65s ease, transform 0.65s ease; }
        .reveal.visible { opacity: 1; transform: none; }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.32s; }

        /* --- 3D scene frame --- */
        .three-canvas canvas { display: block; }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #F5F5F7; }
        ::-webkit-scrollbar-thumb { background: #0071E3; border-radius: 8px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- Trust badge pill --- */
        .trust-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,113,227,0.08);
            border: 1px solid rgba(0,113,227,0.15);
            color: #0071E3;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
        }

        /* --- Category filter pills --- */
        .filter-pill {
            padding: 8px 20px;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 200ms ease;
            border: 1.5px solid #D2D2D7;
            color: #424245;
            background: #fff;
        }
        .filter-pill.active, .filter-pill:hover {
            background: #0071E3;
            color: #fff;
            border-color: #0071E3;
            box-shadow: 0 4px 12px rgba(0,113,227,0.25);
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "three": "https://esm.sh/three@^0.183.0",
        "react": "https://esm.sh/react@^19.2.4",
        "react/": "https://esm.sh/react@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
        "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.3.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.49.1"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
